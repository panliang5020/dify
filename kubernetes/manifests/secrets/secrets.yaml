---
# Secret for Dify application sensitive configuration
#
# SECURITY WARNING: Do NOT apply this file directly.
# The Secret resources below are commented-out reference templates only.
# Always use the 'kubectl create secret' commands shown below (or use an external
# secrets manager) so that credentials are never written to disk in plain text.
#
# Recommended approach — run these commands once before deploying:
#
#   export SECRET_KEY=$(openssl rand -base64 42)
#   export DB_PASSWORD=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 24)
#   export REDIS_PASSWORD=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 24)
#   export WEAVIATE_API_KEY=$(openssl rand -base64 32)
#   export SANDBOX_API_KEY=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 24)
#   export PLUGIN_DAEMON_KEY=$(openssl rand -base64 24 | tr -dc 'a-zA-Z0-9' | head -c 24)
#
#   kubectl create secret generic dify-app-secrets \
#     --namespace dify \
#     --from-literal=SECRET_KEY="${SECRET_KEY}" \
#     --from-literal=INIT_PASSWORD='<your-admin-password>' \
#     --from-literal=DB_USERNAME='postgres' \
#     --from-literal=DB_PASSWORD="${DB_PASSWORD}" \
#     --from-literal=REDIS_PASSWORD="${REDIS_PASSWORD}" \
#     --from-literal=CELERY_BROKER_URL="redis://:${REDIS_PASSWORD}@dify-redis:6379/1" \
#     --from-literal=WEAVIATE_API_KEY="${WEAVIATE_API_KEY}" \
#     --from-literal=S3_ACCESS_KEY='<your-s3-access-key>' \
#     --from-literal=S3_SECRET_KEY='<your-s3-secret-key>' \
#     --from-literal=CODE_EXECUTION_API_KEY="${SANDBOX_API_KEY}" \
#     --from-literal=PLUGIN_DAEMON_KEY="${PLUGIN_DAEMON_KEY}"
#
#   kubectl create secret generic dify-postgres-secret \
#     --namespace dify \
#     --from-literal=POSTGRES_USER='postgres' \
#     --from-literal=POSTGRES_PASSWORD="${DB_PASSWORD}" \
#     --from-literal=POSTGRES_DB='dify'
#
#   kubectl create secret generic dify-redis-secret \
#     --namespace dify \
#     --from-literal=REDIS_PASSWORD="${REDIS_PASSWORD}"
#
# For enterprise environments use an external secrets operator (e.g., HashiCorp
# Vault, AWS Secrets Manager, Azure Key Vault) — see README.md section 6.4.
#
# --------------------------------------------------------------------------
# Reference template (DO NOT apply directly — kept for documentation only):
# --------------------------------------------------------------------------
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: dify-app-secrets
#   namespace: dify
# type: Opaque
# stringData:
#   SECRET_KEY: "<generated-with-openssl-rand-base64-42>"
#   INIT_PASSWORD: "<your-admin-password>"
#   DB_USERNAME: "postgres"
#   DB_PASSWORD: "<strong-random-password>"
#   REDIS_PASSWORD: "<strong-random-password>"
#   CELERY_BROKER_URL: "redis://:<REDIS_PASSWORD>@dify-redis:6379/1"
#   WEAVIATE_API_KEY: "<generated-with-openssl-rand-base64-32>"
#   S3_ACCESS_KEY: "<your-s3-access-key>"
#   S3_SECRET_KEY: "<your-s3-secret-key>"
#   CODE_EXECUTION_API_KEY: "<strong-random-password>"
#   PLUGIN_DAEMON_KEY: "<strong-random-password>"
---
# Secret for TLS certificates (created from cert-manager or manually)
# Use cert-manager in production for automatic certificate management
# kubectl create secret tls dify-tls --cert=path/to/tls.crt --key=path/to/tls.key -n dify
apiVersion: v1
kind: Secret
metadata:
  name: dify-tls
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: tls
  annotations:
    # If using cert-manager, this secret is managed automatically
    cert-manager.io/certificate-name: dify-certificate
type: kubernetes.io/tls
data:
  # Replace with actual base64-encoded certificate and key
  # or use cert-manager to manage this automatically
  tls.crt: ""
  tls.key: ""
---
# Secret for image pull (if using private registry)
# kubectl create secret docker-registry dify-registry-secret \
#   --docker-server=registry.your-domain.com \
#   --docker-username=your-username \
#   --docker-password=your-password \
#   -n dify
# Uncomment and configure if using private registry:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: dify-registry-secret
#   namespace: dify
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: <base64-encoded-docker-config>
