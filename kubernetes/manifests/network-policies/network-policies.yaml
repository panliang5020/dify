---
# NetworkPolicy: Default deny all ingress and egress in dify namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# NetworkPolicy: Allow DNS egress for all pods in dify namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# NetworkPolicy: Allow API to receive from Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-api
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: dify-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - port: 5001
          protocol: TCP
---
# NetworkPolicy: Allow Web to receive from Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-web
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: dify-web
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - port: 3000
          protocol: TCP
---
# NetworkPolicy: Allow API egress to databases
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-to-databases
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: dify-api
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: dify-postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: dify-redis
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: dify-weaviate
      ports:
        - port: 8080
          protocol: TCP
        - port: 50051
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: dify-sandbox
      ports:
        - port: 8194
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: dify-plugin-daemon
      ports:
        - port: 5002
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: dify-ssrf-proxy
      ports:
        - port: 3128
          protocol: TCP
    # Allow external egress for LLM API calls
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
---
# NetworkPolicy: Allow Worker egress to databases
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-worker-to-databases
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: dify-worker
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: dify-postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: dify-redis
      ports:
        - port: 6379
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: dify-weaviate
      ports:
        - port: 8080
          protocol: TCP
        - port: 50051
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: dify-sandbox
      ports:
        - port: 8194
          protocol: TCP
    - to:
        - podSelector:
            matchLabels:
              app: dify-ssrf-proxy
      ports:
        - port: 3128
          protocol: TCP
    # Allow external egress for LLM API calls and web scraping
    - ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
---
# NetworkPolicy: Allow PostgreSQL to receive from API, Worker, Plugin Daemon
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-ingress
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: dify-postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dify-api
        - podSelector:
            matchLabels:
              app: dify-worker
        - podSelector:
            matchLabels:
              app: dify-worker-beat
        - podSelector:
            matchLabels:
              app: dify-plugin-daemon
      ports:
        - port: 5432
          protocol: TCP
---
# NetworkPolicy: Allow Redis to receive from API, Worker, Worker Beat
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-redis-ingress
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app: dify-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: dify-api
        - podSelector:
            matchLabels:
              app: dify-worker
        - podSelector:
            matchLabels:
              app: dify-worker-beat
      ports:
        - port: 6379
          protocol: TCP
---
# NetworkPolicy: Allow monitoring namespace to scrape metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-ingress
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: network-policy
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
