---
# ServiceAccount for Dify API and Worker
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dify-api
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: api
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dify-web
  namespace: dify
  labels:
    app.kubernetes.io/name: dify
    app.kubernetes.io/component: web
automountServiceAccountToken: false
---
# Role for Dify API (minimum permissions)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dify-api-role
  namespace: dify
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
# RoleBinding for API ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dify-api-rolebinding
  namespace: dify
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dify-api-role
subjects:
  - kind: ServiceAccount
    name: dify-api
    namespace: dify
